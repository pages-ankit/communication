<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor WhatsApp Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f7fb;
}

.header {
  position: sticky;
  top: 0;
  background: #ffffff;
  padding: 12px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
  z-index: 10;
}

.container {
  padding: 10px;
}

.student {
  background: white;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.name {
  font-weight: bold;
  margin-bottom: 8px;
  font-size: 15px;
}

.number {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
}

button {
  border: none;
  background: #25D366;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  width: fit-content;
}

button:active {
  transform: scale(0.95);
}

input[type="checkbox"] {
  transform: scale(1.2);
}
</style>

<script>
function createLink(number, name) {
let message =
"Dear Parent of " + name + "%0A%0A" +
"I hope this message finds you well. I am writing to share that I am the mentor for your child, and I am truly honored to have this opportunity.%0A%0A" +
"As a mentor, my aim is to create a positive and supportive environment that helps your child grow academically, emotionally, and personally.%0A%0A" +
"I strongly believe in open communication. Please feel free to reach out anytime._%0A%0A" +
"_Warm regards,_%0AAnkit Chouhan";

return "https://wa.me/91" + number + "?text=" + message;
}

function openWhatsApp(number, name) {
window.location.href = createLink(number, name);
}
</script>

</head>
